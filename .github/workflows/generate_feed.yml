name: Generate feed

on:
  push:
    paths:
      - sukellushuone/jaksot.txt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: cd sukellushuone && python generate_feed.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sukellushuone/feed.xml
          git commit -m "Päivitetty feed.xml" || echo "Ei muutoksia"
          git push
